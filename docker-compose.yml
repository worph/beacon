services:
  beacon:
    build: .
    hostname: beacon
    expose:
      - 9099
    ports:
      - "9300:9300"
    environment:
      - DISCOVERY_INTERVAL=30
      - DISCOVERY_PORT=9099
      - WEB_PORT=9300
      - LOG_LEVEL=info
      # Where external MCP server configs are persisted (file mounted via `data:`)
      - EXTERNAL_CONFIG_PATH=/app/data/external.json
      - EXTERNAL_POLL_INTERVAL=60
    volumes:
      - beacon-data:/app/data
    networks:
      - mcp-net

  # uncomment if you want to test
  # mock-notes:
    # build:
      # context: .
      # dockerfile: mock-servers/mock-notes/Dockerfile
    # environment:
      # - MCP_PORT=9099
      # - DISCOVERY_PORT=9099
    # networks:
      # - mcp-net

  # mock-tasks:
    # build:
      # context: .
      # dockerfile: mock-servers/mock-tasks/Dockerfile
    # environment:
      # - MCP_PORT=9099
      # - DISCOVERY_PORT=9099
    # networks:
      # - mcp-net

networks:
  mcp-net:
    external: true

volumes:
  beacon-data:
