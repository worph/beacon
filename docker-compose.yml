services:
  aggregator:
    build: .
    ports:
      - "9099:9099"
      - "3000:3000"
    environment:
      - DISCOVERY_INTERVAL=30
      - DISCOVERY_PORT=9099
      - WEB_PORT=3000
      - LOG_LEVEL=info
    networks:
      - mcp-net
    depends_on:
      - mock-notes
      - mock-tasks

  mock-notes:
    build:
      context: .
      dockerfile: mock-servers/mock-notes/Dockerfile
    environment:
      - MCP_PORT=9099
      - DISCOVERY_PORT=9099
    networks:
      - mcp-net

  mock-tasks:
    build:
      context: .
      dockerfile: mock-servers/mock-tasks/Dockerfile
    environment:
      - MCP_PORT=9099
      - DISCOVERY_PORT=9099
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge
